services:
  - type: web
    name: jds-search
    env: python
    region: frankfurt
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn jds_search.wsgi:application --bind 0.0.0.0:$PORT --workers 3
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: USE_SUPABASE
        value: "True"
      - key: PYTHON_VERSION
        value: "3.13"
      - key: BASE_DOMAIN
        value: "jds-search.de"

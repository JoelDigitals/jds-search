{% extends "base.html" %}{% block title %}Anmelden – JDS{% endblock %}{% block content %}<div class="ios-auth-center"><div class="ios-auth-card"><h1><span>J</span>DS</h1><h2>Anmelden</h2>{% if error %}<div style="background:rgba(255,59,48,0.08);color:var(--ios-red);padding:10px;border-radius:10px;margin-bottom:12px;font-size:13px;">{{ error }}</div>{% endif %}<form method="POST">{% csrf_token %}<input type="hidden" name="next" value="{{ next|default:'search_home' }}"><div class="ios-input-group"><input type="text" name="username" class="ios-input" value="{{ login_id|default:'' }}" placeholder="Benutzername oder E-Mail" required></div><div class="ios-input-group"><input type="password" name="password" class="ios-input" placeholder="Passwort" required></div><button type="submit" class="ios-submit" style="font-size:17px;font-weight:700;letter-spacing:.5px;">ANMELDEN</button></form><div style="margin-top:28px;font-size:14px;"><a href="{% url 'register' %}">Konto erstellen</a></div></div></div>{% endblock %}

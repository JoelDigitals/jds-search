{% extends "base.html" %}{% block title %}JDS News{% endblock %}{% block content %}
<div class="ios-section" style="max-width:800px;">
    <h2>News</h2>
    {% for a in articles %}<a href="{{ a.url }}" class="ios-card" style="display:block;margin-bottom:10px;text-decoration:none;color:var(--ios-text);">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><span class="ios-badge">{{ a.source }}</span><span style="font-size:12px;color:var(--ios-text3);">{{ a.time }}</span></div>
        <div style="font-size:17px;font-weight:600;margin-bottom:2px;">{{ a.title }}</div>
        <div style="font-size:14px;color:var(--ios-text2);">{{ a.snippet }}</div>
    </a>{% endfor %}
</div>{% endblock %}

{% extends "base.html" %}{% block title %}JDS Translate{% endblock %}{% block content %}
<div class="ios-section" style="max-width:900px;">
    <h2>Translate</h2>
    <div style="display:flex;gap:14px;align-items:stretch;">
        <div style="flex:1;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><select id="sl" class="ios-select" style="width:auto;"><option value="de">Deutsch</option><option value="en">Englisch</option><option value="fr">Franzosisch</option><option value="es">Spanisch</option><option value="it">Italienisch</option><option value="nl">Niederlandisch</option><option value="pl">Polnisch</option></select></div>
        <textarea id="st" class="ios-input" rows="6" placeholder="Text eingeben..." style="font-size:17px;"></textarea></div>
        <div style="display:flex;align-items:center;"><button onclick="swap()" class="ios-btn" style="border-radius:50%;width:44px;height:44px;padding:0;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg></button></div>
        <div style="flex:1;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><select id="tl" class="ios-select" style="width:auto;"><option value="en">Englisch</option><option value="de">Deutsch</option><option value="fr">Franzosisch</option><option value="es">Spanisch</option><option value="it">Italienisch</option><option value="nl">Niederlandisch</option><option value="pl">Polnisch</option></select><button onclick="copy()" class="ios-btn ios-btn-sm" style="margin-left:auto;">Kopieren</button></div>
        <div id="rt" class="ios-card" style="min-height:140px;font-size:17px;background:var(--ios-bg);color:var(--ios-text2);">Ubersetzung erscheint hier...</div></div>
    </div>
    <div style="text-align:center;margin-top:16px;"><button onclick="tr()" class="ios-btn ios-btn-blue ios-btn-lg">Ubersetzen</button></div>
</div>
<script>const D={'de-en':{'hallo':'hello','welt':'world','danke':'thank you','bitte':'please','ja':'yes','nein':'no','gut':'good','suche':'search','maschine':'machine','kalender':'calendar','marktplatz':'marketplace','notizen':'notes','ubersetzung':'translation','sprache':'language','internet':'internet','computer':'computer','software':'software','entwicklung':'development','programmierung':'programming','sicherheit':'security','verschlusselung':'encryption','datenschutz':'data protection','gesundheit':'health','bildung':'education','regierung':'government','wirtschaft':'economy','wissenschaft':'science','technologie':'technology'}};function tr(){const t=document.getElementById('st').value.trim().toLowerCase(),s=document.getElementById('sl').value,tg=document.getElementById('tl').value,k=s+'-'+tg,d=D[k];if(!t){document.getElementById('rt').textContent='Bitte Text eingeben.';return}if(s===tg){document.getElementById('rt').textContent=t;return}if(d&&d[t]){document.getElementById('rt').textContent=d[t];return}let w=t.split(/\s+/).map(w=>d&&d[w]?d[w]:w).join(' ');document.getElementById('rt').textContent=w}function swap(){const s=document.getElementById('sl'),t=document.getElementById('tl');[s.value,t.value]=[t.value,s.value];const st=document.getElementById('st').value,dst=document.getElementById('rt').textContent;document.getElementById('st').value=dst;document.getElementById('rt').textContent=st}function copy(){const t=document.getElementById('rt').textContent;navigator.clipboard.writeText(t)}</script>
{% endblock %}

{% extends "base.html" %}{% block title %}{{ email.subject }} – JDS Mail{% endblock %}{% block content %}
<div class="ios-section" style="max-width:740px;">
    <div style="display:flex;gap:8px;margin-bottom:16px;"><a href="{% url 'mail_home' %}" class="ios-btn ios-btn-sm">Posteingang</a><a href="{% url 'mail_action' email.pk 'archive' %}" class="ios-btn ios-btn-sm">Archivieren</a><a href="{% url 'mail_action' email.pk 'trash' %}" class="ios-btn ios-btn-red ios-btn-sm">Loschen</a></div>
    <div class="ios-card"><h1 style="font-size:22px;font-weight:600;margin-bottom:16px;">{{ email.subject }}</h1>
        <div style="display:flex;gap:20px;flex-wrap:wrap;font-size:13px;color:var(--ios-text3);margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--ios-border2);"><span><strong>Von:</strong> {{ email.sender }}</span><span><strong>An:</strong> {{ email.recipient }}</span><span>{{ email.created_at|date:"d.m.Y H:i" }}</span></div>
        <div style="font-size:15px;line-height:1.6;">{{ email.body|linebreaksbr }}</div>
    </div>
</div>{% endblock %}

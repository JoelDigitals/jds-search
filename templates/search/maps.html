{% extends "base.html" %}{% block title %}JDS Maps{% endblock %}{% block extra_head %}<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>#mm{width:100%;height:calc(100vh - 110px);border-radius:var(--ios-radius)}.maps-overlay{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:999;width:90%;max-width:500px}.maps-card{background:var(--ios-card-solid);border-radius:var(--ios-radius-lg);padding:12px 16px;box-shadow:var(--ios-shadow-lg)}</style>{% endblock %}
{% block content %}<div class="ios-section" style="padding:10px 20px;"><div style="position:relative;">
<div class="maps-overlay"><div class="maps-card"><div style="display:flex;gap:8px;"><input type="text" id="ms" class="ios-input" placeholder="Ort oder Unternehmen suchen..." style="border-radius:var(--ios-radius-pill);font-size:15px;"><button class="ios-btn ios-btn-blue" onclick="searchMap()" style="border-radius:50%;width:38px;height:38px;padding:0;flex-shrink:0;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button></div><div id="mr" style="font-size:13px;color:var(--ios-text3);margin-top:6px;"></div></div></div>
<div id="mm"></div></div></div>
<script>var map=L.map('mm').setView([52.52,13.405],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:19}).addTo(map);
var locations={{ locations|safe }};var markers=[];locations.forEach(function(l){var m=L.marker([l.latitude,l.longitude]).addTo(map).bindPopup('<strong>'+l.business_name+'</strong><br>'+l.category);markers.push(m)});
var searchMarker;async function searchMap(){var q=document.getElementById('ms').value.trim();if(!q)return;document.getElementById('mr').textContent='Suche...';try{var r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=3&q='+encodeURIComponent(q));var d=await r.json();if(d.length>0){var best=d[0];map.setView([best.lat,best.lon],14);if(searchMarker)map.removeLayer(searchMarker);searchMarker=L.marker([best.lat,best.lon],{icon:L.icon({iconUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',iconSize:[25,41],iconAnchor:[12,41]})}).addTo(map).bindPopup('<strong>'+best.display_name.split(',')[0]+'</strong>');document.getElementById('mr').textContent=best.display_name.split(',')[0]}else{document.getElementById('mr').textContent='Keine Ergebnisse'}}catch(e){document.getElementById('mr').textContent='Fehler'}}
document.getElementById('ms').addEventListener('keydown',function(e){if(e.key==='Enter')searchMap()});</script>{% endblock %}
